sudo: required
language: generic

services:
  - docker

before_install:
  - docker build -t sarahwbs/react-test -f ./client/Dockerfile.dev ./client

script:
  - docker run -e CI=true sarahwbs/react-test npm test

after_success:
  - docker build -t sarahwbs/multi-client ./client
  - docker build -t sarahwbs/multi-nginx ./nginx
  - docker build -t sarahwbs/multi-server ./server
  - docker build -t sarahwbs/multi-worker ./worker
  - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_ID" --password-stdin
  - docker push sarahwbs/multi-client
  - docker push sarahwbs/multi-nginx
  - docker push sarahwbs/multi-server
  - docker push sarahwbs/multi-worker

deploy:
  provider: elasticbeanstalk
  region: "us-east-2"
  app: "multi-docker"
  env: "MultiDocker-env"
  bucket_name: "elasticbeanstalk-us-east-2-107964813556"
  bucket_path: "docker-multi"
  # on:
  #   branch: main                         # Only deploy when code is pushed to main
  access_key_id: $AWS_ACCESS_KEY
  secret_access_key: $AWS_SECRET_KEY
